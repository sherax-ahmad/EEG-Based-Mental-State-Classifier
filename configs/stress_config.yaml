# Stress Detection Configuration

task: stress
n_classes: 2
class_names: [No Stress, Stress]

# Data
data_dir: data/processed
data_file: data/processed/stress_data.npy
labels_file: data/processed/stress_labels.npy
sfreq: 128     # DEAP dataset sampling rate

# Preprocessing
lowcut: 0.5
highcut: 45.0
notch_freq: 50.0
epoch_length: 4.0
overlap: 0.5
amplitude_threshold: 100.0

# Feature extraction
use_time_features: true
use_frequency_features: true

# Training
test_size: 0.2
val_size: 0.15
random_state: 42

# Deep learning
epochs: 60
batch_size: 32
patience: 12
